<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Chatbot - Sidebar</title>
  <link rel="stylesheet" href="./assets/index-D2NRN3mc.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", sans-serif;
    }

    body {
      background: transparent;
      color: #333;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.D365Context = {
      getContext: function () {
        try {
          if (window.parent && window.parent.Xrm) {
            return window.parent.Xrm.Utility.getGlobalContext();
          }
        } catch (error) {
          console.warn("Could not access Dynamics 365 context:", error);
        }

        return null;
      },

      getEntityContext: function () {
        try {
          if (window.parent && window.parent.Xrm && window.parent.Xrm.Page) {
            return {
              entityId: window.parent.Xrm.Page.data.entity.getId(),
              entityName: window.parent.Xrm.Page.data.entity.getEntityName(),
              recordName: window.parent.Xrm.Page.data.entity.getPrimaryAttributeValue
                ? window.parent.Xrm.Page.data.entity.getPrimaryAttributeValue()
                : null
            };
          }
        } catch (error) {
          console.warn("Could not access entity context:", error);
        }

        return null;
      },

      getUserInfo: function () {
        try {
          if (window.parent && window.parent.Xrm) {
            var context = window.parent.Xrm.Utility.getGlobalContext();

            return {
              userId: context.userSettings.userId,
              userName: context.userSettings.userName,
              organizationUrl: context.getClientUrl()
            };
          }
        } catch (error) {
          console.warn("Could not access user info:", error);
        }

        return null;
      }
    };

    window.dynamicsContext = {
      globalContext: window.D365Context.getContext(),
      entityContext: window.D365Context.getEntityContext(),
      userInfo: window.D365Context.getUserInfo()
    };

    console.log("Dynamics 365 Context initialized:", window.dynamicsContext);
  </script>

  <script type="module" src="./assets/index-DgMbLLOR.js"></script>
</body>
</html>
